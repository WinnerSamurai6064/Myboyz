name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/nemoclaw:${{ github.sha }} .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/nemoclaw:${{ github.sha }}

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.RESOURCE_GROUP }}
          containerAppName: nemoclaw
          imageToDeploy: ${{ secrets.REGISTRY_LOGIN_SERVER }}/nemoclaw:${{ github.sha }}
          environmentVariables: |
            TELEGRAM_BOT_TOKEN=secretref:telegram-token
            NVIDIA_NIM_API_KEY=secretref:nim-api-key
            NIM_MODEL_KIMI=moonshotai/kimi-k2.5
            NIM_MODEL_GLM=z-ai/glm4.7
            AZURE_STORAGE_CONNECTION_STRING=secretref:storage-conn-str
            BLOB_CONTAINER_NAME=nemoclaw-state
            SESSION_BLOB_NAME=insta-session.pkl
            ACTIVE_WINDOW_SECONDS=300
            TRIGGER_SECRET=secretref:trigger-secret
          scaleMinReplicas: 0
          scaleMaxReplicas: 1
          ingress: external
          targetPort: 8080
